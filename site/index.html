<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>trace</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'JetBrains Mono', ui-monospace, SFMono-Regular, monospace;
      background: #09090b;
      color: #e4e4e7;
      min-height: 100vh;
    }
    .container {
      max-width: 900px;
      margin: 0 auto;
      padding: 40px 20px;
    }
    header {
      margin-bottom: 24px;
    }
    h1 {
      font-size: 13px;
      font-weight: 400;
      color: #71717a;
      margin-bottom: 20px;
    }
    .input-row {
      display: flex;
      gap: 8px;
      margin-bottom: 12px;
    }
    input[type="text"] {
      flex: 1;
      padding: 8px 10px;
      border: 1px solid #27272a;
      background: transparent;
      color: #e4e4e7;
      font-family: inherit;
      font-size: 12px;
      border-radius: 0;
    }
    input[type="text"]:focus {
      outline: none;
      border-color: #71717a;
    }
    button {
      padding: 8px 12px;
      border: 1px solid #27272a;
      background: transparent;
      color: #e4e4e7;
      font-family: inherit;
      font-size: 11px;
      cursor: pointer;
      border-radius: 0;
    }
    button:hover:not(:disabled) {
      border-color: #71717a;
      background: rgba(255, 255, 255, 0.03);
    }
    button:disabled {
      opacity: 0.3;
      cursor: not-allowed;
    }
    .examples {
      display: flex;
      gap: 4px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }
    .example-btn {
      padding: 4px 8px;
      border: 1px solid #18181b;
      background: transparent;
      color: #71717a;
      font-size: 10px;
      cursor: pointer;
      font-family: inherit;
    }
    .example-btn:hover {
      border-color: #27272a;
      color: #a1a1aa;
    }
    #trace-container {
      border: 1px solid #18181b;
      min-height: 400px;
    }
    .loading {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 400px;
      opacity: 0.5;
      font-size: 12px;
      color: #71717a;
    }
    .error {
      padding: 10px;
      margin-bottom: 12px;
      border: 1px solid #7f1d1d;
      color: #fca5a5;
      font-size: 11px;
    }
    .theme-row {
      display: flex;
      gap: 20px;
      margin-top: 20px;
      padding-top: 20px;
      border-top: 1px solid #18181b;
      font-size: 10px;
    }
    .theme-presets {
      display: flex;
      gap: 4px;
      align-items: center;
    }
    .theme-btn {
      padding: 4px 8px;
      border: 1px solid #27272a;
      background: transparent;
      color: #71717a;
      font-size: 10px;
      cursor: pointer;
      font-family: inherit;
      border-radius: 0;
    }
    .theme-btn:hover {
      border-color: #52525b;
      color: #a1a1aa;
    }
    .theme-btn.active {
      border-color: #22c55e;
      color: #e4e4e7;
    }
    .theme-item {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .theme-item label {
      color: #71717a;
    }
    input[type="color"] {
      width: 20px;
      height: 20px;
      padding: 0;
      border: 1px solid #27272a;
      cursor: pointer;
      border-radius: 0;
    }
    input[type="color"]::-webkit-color-swatch-wrapper {
      padding: 0;
    }
    input[type="color"]::-webkit-color-swatch {
      border: none;
    }
    .embed-row {
      margin-top: 16px;
      padding-top: 16px;
      border-top: 1px solid #18181b;
    }
    .embed-code {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 10px;
      background: #09090b;
      font-size: 10px;
      font-family: inherit;
      border: 1px solid #18181b;
    }
    .embed-code code {
      color: #71717a;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateX(-2px); }
      to { opacity: 1; transform: translateX(0); }
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>trace — git history visualizer</h1>
      <div class="input-row">
        <input id="repo-input" placeholder="owner/repo" value="doanbactam/trace">
        <input id="file-input" placeholder="file path" value="src/Trace.tsx">
        <button id="load-btn">load</button>
      </div>
      <div class="examples">
        <button class="example-btn" data-repo="doanbactam/trace" data-file="src/Trace.tsx">trace (self)</button>
        <button class="example-btn" data-repo="vercel/next.js" data-file="packages/next/src/server/app-render/app-render.tsx">next.js</button>
        <button class="example-btn" data-repo="facebook/react" data-file="packages/react/src/React.js">react</button>
      </div>
    </header>

    <div id="error-container"></div>
    <div id="trace-container">
      <div class="loading">load a repository to visualize git history</div>
    </div>

    <div class="theme-row">
      <div class="theme-presets">
        <span style="color: #71717a;">theme:</span>
        <button class="theme-btn active" data-theme="dark">dark</button>
        <button class="theme-btn" data-theme="light">light</button>
        <button class="theme-btn" data-theme="midnight">midnight</button>
        <button class="theme-btn" data-theme="cyber">cyber</button>
        <button class="theme-btn" data-theme="forest">forest</button>
        <button class="theme-btn" data-theme="sunset">sunset</button>
      </div>
    </div>

    <div class="embed-row">
      <div class="embed-code">
        <code id="embed-code">&lt;Trace commits={data} /&gt;</code>
        <button id="copy-btn">copy</button>
      </div>
    </div>
  </div>

  <script>
    let currentCommits = [];
    let activeIndex = 0;
    let isPlaying = false;
    let playInterval = null;
    let currentTheme = 'dark';

    const repoInput = document.getElementById('repo-input');
    const fileInput = document.getElementById('file-input');
    const loadBtn = document.getElementById('load-btn');
    const container = document.getElementById('trace-container');
    const errorContainer = document.getElementById('error-container');
    const embedCodeEl = document.getElementById('embed-code');

    // 2026 preset themes
    const themes = {
      dark: {
        bg: '#09090b',
        fg: '#e4e4e7',
        human: '#22c55e',
        ai: '#a855f7',
        add: 'rgba(34, 102, 68, 0.25)',
        remove: 'rgba(185, 28, 28, 0.2)'
      },
      light: {
        bg: '#ffffff',
        fg: '#18181b',
        human: '#16a34a',
        ai: '#9333ea',
        add: 'rgba(22, 163, 74, 0.15)',
        remove: 'rgba(220, 38, 38, 0.12)'
      },
      midnight: {
        bg: '#030712',
        fg: '#e2e8f0',
        human: '#06b6d4',
        ai: '#f472b6',
        add: 'rgba(6, 182, 212, 0.2)',
        remove: 'rgba(244, 114, 182, 0.15)'
      },
      cyber: {
        bg: '#050505',
        fg: '#f0f0f0',
        human: '#00ff9f',
        ai: '#ff00ff',
        add: 'rgba(0, 255, 159, 0.2)',
        remove: 'rgba(255, 0, 255, 0.15)'
      },
      forest: {
        bg: '#0a1208',
        fg: '#d4e5d4',
        human: '#4ade80',
        ai: '#2dd4bf',
        add: 'rgba(74, 222, 128, 0.2)',
        remove: 'rgba(248, 113, 113, 0.15)'
      },
      sunset: {
        bg: '#0f0808',
        fg: '#f5e6e6',
        human: '#fb923c',
        ai: '#f43f5e',
        add: 'rgba(251, 146, 60, 0.2)',
        remove: 'rgba(244, 63, 94, 0.15)'
      }
    };

    function getColors() {
      return themes[currentTheme];
    }

    document.querySelectorAll('.example-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        repoInput.value = btn.dataset.repo;
        fileInput.value = btn.dataset.file;
        loadRepo();
      });
    });

    // Theme switching
    document.querySelectorAll('.theme-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        currentTheme = btn.dataset.theme;
        document.querySelectorAll('.theme-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');

        const colors = getColors();
        document.body.style.background = colors.bg;
        document.body.style.color = colors.fg;
        render();
      });
    });

    document.getElementById('copy-btn').addEventListener('click', () => {
      const code = embedCodeEl.textContent;
      navigator.clipboard.writeText(code).then(() => {
        const btn = document.getElementById('copy-btn');
        btn.textContent = 'copied';
        setTimeout(() => { btn.textContent = 'copy'; }, 1200);
      });
    });

    loadBtn.addEventListener('click', loadRepo);

    function stopPlay() {
      if (playInterval) {
        clearInterval(playInterval);
        playInterval = null;
      }
      isPlaying = false;
    }

    function startPlay() {
      if (playInterval) stopPlay();
      isPlaying = true;
      playInterval = setInterval(() => {
        if (activeIndex >= currentCommits.length - 1) {
          stopPlay();
          render();
          return;
        }
        activeIndex++;
        render();
      }, 2000);
      render();
    }

    function togglePlay() {
      if (isPlaying) stopPlay(); else startPlay();
    }

    async function loadRepo() {
      const repo = repoInput.value.trim();
      const file = fileInput.value.trim();

      if (!repo || !file) {
        showError('enter both repo and file path');
        return;
      }

      stopPlay();
      loadBtn.disabled = true;
      loadBtn.textContent = '...';
      errorContainer.innerHTML = '';
      container.innerHTML = '<div class="loading">fetching commits...</div>';

      try {
        const [owner, repoName] = repo.split('/');
        const res = await fetch(
          `https://api.github.com/repos/${owner}/${repoName}/commits?path=${encodeURIComponent(file)}&per_page=10`
        );

        if (!res.ok) {
          if (res.status === 403) throw new Error('rate limit exceeded');
          if (res.status === 404) throw new Error('not found');
          throw new Error(`api error: ${res.status}`);
        }

        const commitsList = await res.json();
        const commits = (await Promise.all(
          commitsList.slice(0, 8).map(async (c) => {
            const detailRes = await fetch(c.url);
            if (!detailRes.ok) return null;
            return parseCommit(await detailRes.json());
          })
        )).filter(Boolean);

        currentCommits = commits;
        activeIndex = 0;
        updateEmbedCode(repo, file);
        render();

      } catch (err) {
        showError(err.message);
      } finally {
        loadBtn.disabled = false;
        loadBtn.textContent = 'load';
      }
    }

    function updateEmbedCode(repo, file) {
      embedCodeEl.textContent = `<Trace repo="${repo}" file="${file}" />`;
    }

    function parseCommit(data) {
      const { sha, commit, author } = data;
      const email = commit.author?.email || '';
      const message = commit.message || '';
      const login = author?.login || '';
      const isAI = /bot|cursor|claude|copilot|ai/i.test(email + ' ' + message + ' ' + login);

      const lines = [];
      for (const file of data.files || []) {
        if (!file.patch) continue;
        for (const line of file.patch.split('\n')) {
          if (line.startsWith('@@') || line.startsWith('+++') || line.startsWith('---')) continue;
          if (line.startsWith('+')) lines.push({ type: 'add', content: line.slice(1) });
          else if (line.startsWith('-')) lines.push({ type: 'remove', content: line.slice(1) });
          else lines.push({ type: 'ctx', content: line.slice(1) || '' });
        }
      }

      return {
        hash: sha.slice(0, 7),
        message: commit.message.split('\n')[0],
        author: author?.login || commit.author?.name || 'unknown',
        authorType: isAI ? 'ai' : 'human',
        time: formatDate(commit.author?.date),
        lines
      };
    }

    function formatDate(dateStr) {
      const date = new Date(dateStr);
      const diff = Date.now() - date.getTime();
      const days = Math.floor(diff / 86400000);
      if (days > 30) return date.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
      if (days > 0) return `${days}d ago`;
      return 'today';
    }

    function render() {
      if (!currentCommits.length) return;
      const commit = currentCommits[activeIndex];
      const colors = getColors();
      const progressHeight = ((activeIndex + 1) / currentCommits.length) * 100;

      container.innerHTML = `
        <div style="display: flex; height: 460px; background: ${colors.bg};">
          <div style="width: 220px; border-right: 1px solid ${currentTheme === 'light' ? '#e4e4e7' : '#18181b'}; padding: 0; overflow-y: auto; position: relative;">
            <div style="position: absolute; left: 0; top: 0; bottom: 0; width: 2px; background: ${commit.authorType === 'ai' ? colors.ai : colors.human}; opacity: 0.6; pointer-events: none; transition: height 0.25s ease-out; height: ${progressHeight}%;"></div>
            ${currentCommits.map((c, i) => `
              <div class="commit-item" data-index="${i}"
                   style="padding: 10px 12px; cursor: pointer; border-left: 2px solid transparent; ${i === activeIndex ? `background: ${currentTheme === 'light' ? 'rgba(0,0,0,0.03)' : 'rgba(255,255,255,0.03)'}; border-left-color: ${c.authorType === 'ai' ? colors.ai : colors.human}` : ''}">
                <div style="display: flex; align-items: center; gap: 6px; margin-bottom: 2px;">
                  <span style="width: 5px; height: 5px; border-radius: 50%; background: ${c.authorType === 'ai' ? colors.ai : colors.human}; flex-shrink: 0;"></span>
                  <span style="font-size: 11px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex: 1; color: ${colors.fg};">${escapeHtml(c.message)}</span>
                  <span style="font-size: 9px; color: #71717a;">${c.authorType}</span>
                </div>
                <div style="font-size: 10px; color: #71717a; padding-left: 11px;">${c.author} · ${c.time}</div>
              </div>
            `).join('')}
          </div>
          <div style="flex: 1; display: flex; flex-direction: column;">
            <div style="padding: 10px 12px; border-bottom: 1px solid ${currentTheme === 'light' ? '#e4e4e7' : '#18181b'}; background: ${colors.bg};">
              <div style="font-size: 12px; margin-bottom: 2px; color: ${colors.fg};">${escapeHtml(commit.message)}</div>
              <div style="font-size: 10px; color: #71717a;">${commit.hash} · ${commit.author}</div>
            </div>
            <div style="flex: 1; padding: 0 12px; overflow-y: auto; font-family: inherit; font-size: 11px; line-height: 1.6;">
              ${commit.lines.map((l, i) => {
                const isAdd = l.type === 'add';
                const isRemove = l.type === 'remove';
                const bg = isAdd ? colors.add : isRemove ? colors.remove : 'transparent';
                const color = isAdd ? (currentTheme === 'light' ? '#16a34a' : '#86efac') : isRemove ? (currentTheme === 'light' ? '#dc2626' : '#fca5a5') : colors.fg;
                const prefix = isAdd ? '+' : isRemove ? '-' : ' ';
                return `<div style="animation: fadeIn 0.18s ease-out ${i * 0.035}s both; padding: 1px 0; background: ${bg}; min-height: 18px; opacity: 0; display: flex;"><span style="color: ${isAdd ? colors.human : isRemove ? '#ef4444' : 'inherit'}; opacity: 0.5; margin-right: 8px; font-size: 9px; user-select: none; width: 12px; text-align: center;">${prefix}</span><span style="color: ${color};">${escapeHtml(l.content || ' ')}</span></div>`;
              }).join('')}
            </div>
            <div style="padding: 8px 12px; border-top: 1px solid ${currentTheme === 'light' ? '#e4e4e7' : '#18181b'}; display: flex; gap: 6px;">
              <button id="prev-btn" ${activeIndex === 0 ? 'disabled style="opacity: 0.3;"' : ''}>prev</button>
              <button id="play-btn">${isPlaying ? 'pause' : 'play'}</button>
              <button id="next-btn" ${activeIndex >= currentCommits.length - 1 ? 'disabled style="opacity: 0.3;"' : ''}>next</button>
              <span style="font-size: 10px; color: #71717a; margin-left: auto;">${activeIndex + 1} / ${currentCommits.length}</span>
            </div>
          </div>
        </div>
      `;

      document.querySelectorAll('.commit-item').forEach(item => {
        item.addEventListener('click', () => {
          stopPlay();
          activeIndex = parseInt(item.dataset.index);
          render();
        });
      });

      const prevBtn = document.getElementById('prev-btn');
      const nextBtn = document.getElementById('next-btn');
      const playBtn = document.getElementById('play-btn');

      if (prevBtn && !prevBtn.disabled) prevBtn.addEventListener('click', () => { stopPlay(); activeIndex--; render(); });
      if (nextBtn && !nextBtn.disabled) nextBtn.addEventListener('click', () => { stopPlay(); activeIndex++; render(); });
      if (playBtn) playBtn.addEventListener('click', togglePlay);
    }

    function showError(msg) {
      errorContainer.innerHTML = `<div class="error">${escapeHtml(msg)}</div>`;
    }

    function escapeHtml(str) {
      const div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }
  </script>
</body>
</html>
